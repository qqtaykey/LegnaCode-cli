# Build-time macro definitions for Bun's bundler.
#
# MACRO.* values are replaced at compile time in source code.
# Feature flags control dead code elimination via `import { feature } from 'bun:bundle'`

[bundle.define]
"MACRO.VERSION" = '"1.0.1"'
"MACRO.BUILD_TIME" = '"2026-03-31T00:00:00.000Z"'
"MACRO.PACKAGE_URL" = '"@anthropic-ai/claude-code"'
"MACRO.NATIVE_PACKAGE_URL" = '""'
"MACRO.FEEDBACK_CHANNEL" = '"https://github.com/anthropics/claude-code/issues"'
"MACRO.ISSUES_EXPLAINER" = '"report the issue at https://github.com/anthropics/claude-code/issues"'
"MACRO.VERSION_CHANGELOG" = '""'

# Feature flags — set to "true" to include, "false" to strip at build time.
